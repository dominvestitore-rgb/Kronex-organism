<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SMITH — Operational Financial Intelligence</title>

<!-- Fonts: editorial display + mono institucional -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

<!-- CDNs -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ═══════════════════════════════════════════════════
     TAILWIND DESIGN SYSTEM — paleta institucional SMITH
     Quiet Luxury · Atlas tier · Preto absoluto + Ouro champanhe
═══════════════════════════════════════════════════ -->
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        // FOUNDATION
        "bg-core":     "#000000",   // preto absoluto
        "bg-elevated": "#121212",   // grafite profundo
        "bg-panel":    "#0A0A0A",   // panel base
        "bg-hover":    "#161616",   // hover state
        // ACCENTS
        "silver":      "#A1A1AA",   // prata fosco (bordas, texto secundário)
        "silver-dim":  "#52525B",   // prata escuro
        "gold":        "#D4AF37",   // ouro champanhe (EXCLUSIVO dados críticos)
        "gold-dark":   "#8B6914",   // ouro sombra
        "gold-hi":     "#F0D060",   // ouro highlight
        // TYPOGRAPHY
        "white-pure":  "#FFFFFF",
        "white-90":    "#F5F5F7",   // alabaster
        "white-55":    "#8E8E93",   // texto muted
        "white-20":    "rgba(255,255,255,0.20)",
        "white-08":    "rgba(255,255,255,0.08)",
        "white-04":    "rgba(255,255,255,0.04)",
      },
      fontFamily: {
        display: ["'Syne'", "system-ui", "sans-serif"],
        body:    ["'Inter'", "'SF Pro Display'", "system-ui", "sans-serif"],
        mono:    ["'JetBrains Mono'", "'SF Mono'", "monospace"],
      },
      letterSpacing: {
        tighter:   "-0.04em",   // editorial display
        tight:     "-0.02em",
        normal:    "0",
        wide:      "0.1em",
        wider:     "0.2em",
        widest:    "0.32em",
      },
      animation: {
        "gold-pulse":   "goldPulse 2.6s ease-in-out infinite",
        "surface-glow": "surfaceGlow 9s ease-in-out infinite",
        "atmo-drift":   "atmoDrift 20s ease-in-out infinite",
        "scan-line":    "scanLine 11s linear infinite",
        "log-scroll":   "logScroll 48s linear infinite",
        "titan-spin":   "titanSpin 7s ease-in-out infinite",
        "orb-float":    "orbFloat 8s ease-in-out infinite",
        "blink":        "blink 1s step-end infinite",
      },
      keyframes: {
        goldPulse:  {"0%,100%":{opacity:".4","box-shadow":"0 0 0 0 rgba(212,175,55,0)"},"50%":{opacity:"1","box-shadow":"0 0 0 4px rgba(212,175,55,.1),0 0 14px rgba(212,175,55,.35)"}},
        surfaceGlow:{"0%,100%":{opacity:".3",transform:"scale(1)"},"50%":{opacity:".55",transform:"scale(1.07)"}},
        atmoDrift:  {"0%":{transform:"translate(0,0) scale(1)",opacity:".4"},"33%":{transform:"translate(20px,-14px) scale(1.06)",opacity:".6"},"66%":{transform:"translate(-14px,10px) scale(.97)",opacity:".45"},"100%":{transform:"translate(0,0) scale(1)",opacity:".4"}},
        scanLine:   {"0%":{top:"-1px",opacity:"0"},"4%":{opacity:".7"},"96%":{opacity:".35"},"100%":{top:"100%",opacity:"0"}},
        logScroll:  {"from":{transform:"translateY(0)"},"to":{transform:"translateY(-50%)"}},
        titanSpin:  {"0%":{"background-position":"0% 50%"},"50%":{"background-position":"100% 50%"},"100%":{"background-position":"0% 50%"}},
        orbFloat:   {"0%,100%":{transform:"translateY(0)"},"50%":{transform:"translateY(-10px)"}},
        blink:      {"0%,100%":{opacity:"1"},"50%":{opacity:"0"}},
      },
      boxShadow: {
        // painéis bento
        "bento":      "0 8px 32px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05)",
        "bento-hover":"0 12px 48px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07), 0 0 0 1px rgba(161,161,170,.12)",
        "gold-outer": "0 0 24px rgba(212,175,55,.18), 0 0 60px rgba(212,175,55,.06)",
        "gold-inner": "inset 0 0 20px rgba(212,175,55,.06)",
        "surface":    "0 20px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04)",
      },
      backdropBlur: { "bento": "24px" },
    }
  }
}
</script>

<style>
/* ════════════════════════════════════════════════════════
   GLOBAL + RESET
════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  background: #000000;
  color: #F5F5F7;
  font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  scroll-behavior: auto;
}
body { min-height: 100vh; overflow-x: hidden; }
::-webkit-scrollbar { width: 1px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: #1a1a1a; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

/* ── THREE.JS CANVAS ──────────────────────────────── */
#qc {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0;
  transition: opacity 2.5s ease;
}

/* ── CAMPO COGNITIVO ─────────────────────────────── */
#hero-cv {
  position: absolute; inset: 0; z-index: 2;
  pointer-events: none; opacity: 0;
  transition: opacity 2s ease .8s;
}

/* ── LOADER ──────────────────────────────────────── */
#loader {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; pointer-events: none;
}
.ld-logo {
  font-family: 'Syne', sans-serif;
  font-size: clamp(3rem, 8vw, 5rem);
  font-weight: 800;
  letter-spacing: -0.045em;
  background: linear-gradient(135deg,
    #F0D060 0%, #D4AF37 28%, #8B6914 52%,
    #D4AF37 68%, #F0D060 100%
  );
  background-size: 280% 280%;
  -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: titanSpin 4s ease-in-out infinite;
  opacity: 0;
}
.ld-track {
  width: clamp(140px, 22vw, 210px); height: 1px;
  background: rgba(255,255,255,.06); border-radius: 1px; overflow: hidden;
}
.ld-fill {
  height: 100%; width: 0;
  background: linear-gradient(90deg, transparent, #D4AF37, rgba(212,175,55,.4));
}
.ld-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 400;
  letter-spacing: .28em; color: #D4AF37; opacity: .65;
}
.ld-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; letter-spacing: .18em; text-transform: uppercase;
  color: rgba(255,255,255,.22); margin-top: -12px;
}

/* ── BENTO GLASS PANELS ─────────────────────────── */
.bento {
  background: rgba(255,255,255,.02);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid rgba(255,255,255,.05);
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  position: relative; overflow: hidden;
  transition: all 500ms cubic-bezier(.4,0,.2,1);
}
.bento::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.07) 30%, rgba(255,255,255,.07) 70%, transparent);
}
.bento:hover {
  background: rgba(255,255,255,.04);
  border-color: rgba(161,161,170,.3);
  box-shadow: 0 12px 48px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07), 0 0 0 1px rgba(161,161,170,.12);
  transform: translateY(-1px);
}
/* bento com acento dourado */
.bento-gold {
  border-color: rgba(212,175,55,.18);
}
.bento-gold::before {
  background: linear-gradient(90deg, transparent, rgba(212,175,55,.2) 30%, rgba(212,175,55,.2) 70%, transparent);
}
.bento-gold:hover {
  border-color: rgba(212,175,55,.35);
  box-shadow: 0 12px 48px rgba(0,0,0,.65), 0 0 24px rgba(212,175,55,.08), inset 0 1px 0 rgba(212,175,55,.08);
}

/* ── HERO ──────────────────────────────────────── */
#hero {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 58% 48% at 50% 50%, rgba(212,175,55,.055) 0%, rgba(212,175,55,.015) 42%, transparent 65%),
    radial-gradient(ellipse 32% 55% at 88% 38%, rgba(255,255,255,.018) 0%, transparent 58%),
    radial-gradient(ellipse 25% 45% at 10% 65%, rgba(212,175,55,.012) 0%, transparent 55%),
    linear-gradient(180deg, rgba(18,18,18,.9) 0%, #000 20%, #000 80%, rgba(10,10,10,.95) 100%),
    #000;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  position: relative; overflow: hidden;
}
/* vinheta */
#hero::before {
  content: '';
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse 88% 88% at 50% 50%, transparent 28%, rgba(0,0,0,.6) 65%, rgba(0,0,0,.9) 100%);
  pointer-events: none;
}
/* scanline */
.hero-scan {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,.06) 20%, rgba(255,255,255,.18) 50%, rgba(212,175,55,.06) 80%, transparent);
  animation: scanLine 11s linear infinite;
  z-index: 3; pointer-events: none;
}
/* vol */
.hero-vol {
  position: absolute; border-radius: 50%;
  pointer-events: none; z-index: 2;
}
.hv1 {
  width: clamp(500px, 72vw, 960px);
  height: clamp(220px, 34vw, 480px);
  background: radial-gradient(ellipse, rgba(212,175,55,.06) 0%, rgba(212,175,55,.02) 38%, transparent 65%);
  filter: blur(3px);
  animation: surfaceGlow 11s ease-in-out infinite;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.hv2 {
  width: clamp(700px, 96vw, 1400px);
  height: clamp(340px, 52vw, 720px);
  background: radial-gradient(ellipse, rgba(212,175,55,.025) 0%, transparent 65%);
  filter: blur(50px);
  animation: atmoDrift 22s ease-in-out infinite;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}

/* strip topo */
.hero-strip {
  position: absolute; top: 0; left: 0; right: 0;
  height: 44px; z-index: 8;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(24px, 5.5vw, 80px);
  background: rgba(0,0,0,.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.strip-item {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: .12em;
  color: rgba(255,255,255,.25);
  display: flex; align-items: center; gap: 7px;
}
.strip-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: #D4AF37;
  animation: goldPulse 2.6s ease-in-out infinite;
}
.strip-val { color: rgba(212,175,55,.6); }

/* SMITH — objeto de titanium escovado */
.smith-wrap {
  position: relative; display: inline-block;
  transform-style: preserve-3d;
}
.smith-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(7rem, 22vw, 16rem);
  font-weight: 800;
  line-height: .88;
  letter-spacing: -0.045em;
  /* TITANIUM — 60% branco/prata, 3% champanhe */
  background: linear-gradient(
    135deg,
    rgba(255,255,255,.88)   0%,
    rgba(195,195,193,.9)   12%,
    rgba(145,142,138,.84)  26%,
    rgba(218,215,210,.88)  38%,
    rgba(212,175,55,.7)    50%,  /* champanhe: 3% do espectro */
    rgba(218,215,210,.88)  62%,
    rgba(138,135,130,.8)   74%,
    rgba(195,193,190,.84)  86%,
    rgba(255,255,255,.82)  100%
  );
  background-size: 280% 280%;
  -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: titanSpin 7s ease-in-out infinite;
  will-change: filter;
  filter:
    drop-shadow(0 2px 0 rgba(100,95,90,.5))
    drop-shadow(0 4px 4px rgba(0,0,0,.6))
    drop-shadow(0 0 40px rgba(212,175,55,.12))
    drop-shadow(0 0 90px rgba(212,175,55,.05));
}
/* light sweep — reflexo físico */
.smith-title::before {
  content: 'SMITH';
  position: absolute; inset: 0;
  background: linear-gradient(
    108deg,
    transparent 28%,
    rgba(255,255,255,.18) 48%,
    rgba(255,255,255,.28) 50%,
    rgba(255,255,255,.18) 52%,
    transparent 72%
  );
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: titanSpin 5s ease-in-out infinite;
  pointer-events: none; z-index: 2;
}
/* escovado — micro-linhas fisicas */
.smith-title::after {
  content: 'SMITH';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    88.5deg,
    transparent          0px,
    rgba(255,255,255,.02) 1px,
    transparent          2px,
    transparent          6px
  );
  -webkit-background-clip: text; background-clip: text; color: transparent;
  mix-blend-mode: overlay; opacity: .8;
  pointer-events: none; z-index: 3;
}
/* glitch */
@keyframes glitch {
  0%,100%  { clip-path: none; transform: translateX(0); }
  18%      { clip-path: inset(28% 0 44% 0); transform: translateX(-5px); }
  19%      { clip-path: inset(8% 0 82% 0);  transform: translateX(5px); }
  20%      { clip-path: none; transform: translateX(0); }
  62%      { clip-path: inset(64% 0 18% 0); transform: translateX(3px); }
  63%      { clip-path: none; transform: translateX(0); }
}
.smith-glitch { animation: glitch .18s steps(1) forwards, titanSpin 7s ease-in-out infinite !important; }

/* hero body */
.hero-body {
  position: relative; z-index: 5;
  padding: 0 clamp(24px, 5.5vw, 80px) clamp(60px, 10vh, 100px);
}
.hero-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(.6rem, 1.05vw, .72rem);
  font-weight: 300; letter-spacing: .38em; text-transform: uppercase;
  color: rgba(255,255,255,.35);
  margin-top: clamp(10px, 1.6vh, 16px);
  margin-bottom: clamp(18px, 2.8vh, 26px);
}
.hero-rule { width: 40px; height: 1px; background: rgba(212,175,55,.3); margin-bottom: clamp(14px, 2.2vh, 20px); }
.hero-phrase {
  font-family: 'Syne', sans-serif;
  font-size: clamp(.9rem, 1.9vw, 1.25rem);
  font-weight: 300; line-height: 1.72;
  color: rgba(255,255,255,.32); max-width: 460px;
}
.hero-phrase em { font-style: normal; color: rgba(255,255,255,.55); }
.hero-status {
  position: absolute; right: clamp(24px, 5.5vw, 80px);
  bottom: clamp(60px, 10vh, 100px); z-index: 5;
  display: flex; flex-direction: column; gap: 6px;
}
@media (max-width: 640px) { .hero-status { display: none; } }
.hst {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: .1em;
  color: rgba(255,255,255,.2);
  display: flex; align-items: center; gap: 7px;
}
.hst.live { color: rgba(212,175,55,.55); }
.hst-dot { width: 4px; height: 4px; border-radius: 50%; background: #D4AF37; animation: goldPulse 2.6s ease-in-out infinite; }
.hero-scroll {
  position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  z-index: 5; opacity: 0;
}
.hs-l { width: 1px; height: 26px; background: linear-gradient(180deg, transparent, rgba(212,175,55,.28)); }
.hs-t { font-family: 'JetBrains Mono', monospace; font-size: 7px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.18); }

/* ── PIPELINE STEPS ───────────────────────────── */
.p-step {
  display: flex; align-items: center; gap: 16px;
  padding: clamp(11px, 1.7vh, 16px) clamp(8px, 1.2vw, 14px);
  border-bottom: 1px solid rgba(255,255,255,.04);
  opacity: .18; border-radius: 12px;
  transition: opacity .7s cubic-bezier(.16,1,.3,1),
              background .5s ease,
              padding-left .5s cubic-bezier(.16,1,.3,1);
}
.p-step:last-child { border-bottom: none; }
.p-step.active { opacity: 1; background: rgba(212,175,55,.03); padding-left: clamp(14px, 2vw, 22px); }
.p-step-n { font-family: 'JetBrains Mono', monospace; font-size: 7px; letter-spacing: .16em; color: rgba(212,175,55,.38); flex-shrink: 0; min-width: 20px; }
.p-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(212,175,55,.2); flex-shrink: 0; transition: all .6s cubic-bezier(.16,1,.3,1); }
.p-step.active .p-dot { background: radial-gradient(circle at 36% 34%, rgba(255,255,255,.5) 0%, #D4AF37 60%); border-color: #D4AF37; animation: goldPulse 2.2s ease-in-out infinite; }
.p-name { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.7); margin-bottom: 3px; }
.p-log  { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: .04em; color: rgba(255,255,255,.22); }
.p-step.active .p-log { color: rgba(212,175,55,.7); }
.p-st   { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: rgba(212,175,55,.5); opacity: 0; transition: opacity .4s ease; }
.p-step.active .p-st { opacity: 1; }
.p-line { width: 1px; height: clamp(8px, 1.3vh, 13px); background: linear-gradient(180deg, rgba(212,175,55,.04), rgba(212,175,55,.18), rgba(212,175,55,.04)); margin-left: clamp(34px, 5vw, 52px); }

/* ── BARRA DE ALVOS (Design System Spec §4) ─────── */
.target-bar-wrap { background: rgba(255,255,255,.04); border-radius: 6px; height: 6px; overflow: visible; position: relative; }
.target-bar-fill {
  height: 100%; border-radius: 6px; width: 0;
  background: #A1A1AA; /* prata fosco — travada */
  transition: width 1.7s cubic-bezier(.16,1,.3,1);
  position: relative;
}
.target-bar-fill.triggered {
  background: linear-gradient(90deg, #8B6914, #D4AF37, #F0D060); /* ilumina com ouro */
  box-shadow: 0 0 10px rgba(212,175,55,.45), 0 0 24px rgba(212,175,55,.18);
}
.target-bar-fill::after {
  content: ''; position: absolute; right: -1px; top: -4px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #A1A1AA;
  box-shadow: 0 0 8px rgba(161,161,170,.4);
  transition: all .5s ease;
}
.target-bar-fill.triggered::after {
  background: #D4AF37;
  box-shadow: 0 0 12px rgba(212,175,55,.7), 0 0 28px rgba(212,175,55,.3);
}

/* ── SLIDER PREMIUM ──────────────────────────── */
.sim-slider { -webkit-appearance: none; appearance: none; flex: 1; height: 1px; background: rgba(255,255,255,.08); border-radius: 1px; outline: none; cursor: pointer; }
.sim-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #000; border: 1.5px solid #D4AF37; box-shadow: 0 0 10px rgba(212,175,55,.4); cursor: pointer; }
.sim-slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #000; border: 1.5px solid #D4AF37; cursor: pointer; }

/* ── ORB 3D NÚCLEO ───────────────────────────── */
.orb-outer { border-radius: 50%; border: 1px solid rgba(255,255,255,.04); display: flex; align-items: center; justify-content: center; position: relative; animation: orbFloat 8s ease-in-out infinite; }
.orb-outer::before { content: ''; position: absolute; inset: -14px; border-radius: 50%; border: 1px solid rgba(212,175,55,.06); }
.orb-outer::after  { content: ''; position: absolute; inset: -28px; border-radius: 50%; border: 1px solid rgba(212,175,55,.03); }
.orb-inner { border-radius: 50%; background: radial-gradient(circle at 38% 34%, rgba(255,255,255,.07) 0%, rgba(212,175,55,.1) 30%, rgba(70,55,20,.12) 60%, rgba(0,0,0,.98) 100%); border: 1px solid rgba(212,175,55,.14); display: flex; align-items: center; justify-content: center; animation: surfaceGlow 6.5s ease-in-out infinite; box-shadow: 0 0 30px rgba(212,175,55,.05), 0 0 70px rgba(212,175,55,.02); }

/* ── REVEAL CLASSES ──────────────────────────── */
.rv { opacity: 0; transform: translateY(28px); filter: blur(3px); transition: opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1), filter .9s cubic-bezier(.16,1,.3,1); }
.rv.vis { opacity: 1; transform: translateY(0); filter: blur(0); }
.rv.d1 { transition-delay: .12s; } .rv.d2 { transition-delay: .22s; } .rv.d3 { transition-delay: .34s; } .rv.d4 { transition-delay: .46s; }

/* ── ORB RINGS 3D ─────────────────────────────── */
@keyframes ring1 { from { transform: rotateX(68deg) rotateZ(0deg); }   to { transform: rotateX(68deg) rotateZ(360deg); }  }

<!-- ══════════════════════════════════════════════════
     THREE.JS — QUANTUM SMOKE
     Titanium escuro com 3% champanhe
══════════════════════════════════════════════════ -->
<script>
(function(){
  if(typeof THREE==='undefined')return;
  const cv=document.getElementById('qc');
  const rdr=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:false,powerPreference:'low-power'});
  rdr.setPixelRatio(Math.min(devicePixelRatio,1.5));
  rdr.setClearColor(0,0);
  const scene=new THREE.Scene(), cam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  const frag=`
    precision mediump float;
    uniform float uT; uniform vec2 uR; uniform float uI;
    vec2 h(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return-1.+2.*fract(sin(p)*43758.5);}
    float g(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);return mix(mix(dot(h(i),f),dot(h(i+vec2(1,0)),f-vec2(1,0)),u.x),mix(dot(h(i+vec2(0,1)),f-vec2(0,1)),dot(h(i+vec2(1)),f-vec2(1)),u.x),u.y);}
    float fbm(vec2 p){float v=0.,a=.5;mat2 r=mat2(cos(.5),sin(.5),-sin(.5),cos(.5));for(int i=0;i<6;i++){v+=a*g(p);p=r*p*2.1+vec2(.3,.2)*uT*.028;a*=.48;}return v;}
    void main(){
      vec2 uv=(gl_FragCoord.xy/uR)*2.-1.;uv.x*=uR.x/uR.y;
      float t=uT*.035;
      vec2 q=vec2(fbm(uv+t),fbm(uv+vec2(5.2,1.3)+t));
      vec2 r=vec2(fbm(uv+3.8*q+vec2(1.7,9.2)+t*.72),fbm(uv+3.8*q+vec2(8.3,2.8)+t*.72));
      vec2 s=vec2(fbm(uv+2.4*r+vec2(3.1,4.6)+t*.5),fbm(uv+2.4*r+vec2(6.4,1.2)+t*.5));
      float f=fbm(uv+2.8*s);float sm=(f*.5+.5);
      /* 97% titanium + 3% champanhe */
      vec3 ti=vec3(.11,.11,.1);
      vec3 ch=vec3(.83,.69,.22);
      float cp=abs(sin(uT*.018));
      vec3 col=mix(vec3(.022,.02,.016),mix(ti*.06,ch*.04,cp*.08),sm*sm*uI);
      float v=1.-dot(uv*.5,uv*.5);v=pow(max(0.,v),1.65);col*=v;
      gl_FragColor=vec4(col,sm*sm*.11*uI*v);
    }`;
  const mat=new THREE.ShaderMaterial({
    vertexShader:'void main(){gl_Position=vec4(position,1.);}',
    fragmentShader:frag,
    uniforms:{uT:{value:0},uR:{value:new THREE.Vector2()},uI:{value:0}},
    transparent:true,depthWrite:false
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));
  let tgt=0,cur=0;
  function rs(){const W=innerWidth,H=innerHeight;rdr.setSize(W,H);mat.uniforms.uR.value.set(W,H);}
  rs();
  window._qi=v=>{tgt=Math.max(0,Math.min(3,v));};
  (function loop(t){requestAnimationFrame(loop);mat.uniforms.uT.value=t*.001;cur+=(tgt-cur)*.012;mat.uniforms.uI.value=cur;rdr.render(scene,cam);})(0);
  addEventListener('resize',rs,{passive:true});
})();
</script>

<!-- ══════════════════════════════════════════════════
     CAMPO COGNITIVO — vetores direcionais
══════════════════════════════════════════════════ -->
<script>
window._startCogField=function(){
  const cv=document.getElementById('hero-cv');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  let W,H,t=0,vecs=[],nodes=[];
  function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  rs();
  function mkV(){
    const a=Math.random()*Math.PI*2,sp=.14+Math.random()*.24,z=Math.random();
    return{x:Math.random()*W,y:Math.random()*H,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,z,
      r:.22+z*.85,alpha:.07+z*.3,life:Math.random()*240,maxLife:180+Math.random()*300,
      trail:[],trailMax:Math.floor(5+z*12),hi:Math.random()>.65};
  }
  function mkN(){return{x:W*(.12+Math.random()*.76),y:H*(.18+Math.random()*.64),r:18+Math.random()*52,str:.00025+Math.random()*.00045,phase:Math.random()*Math.PI*2,z:.3+Math.random()*.7};}
  function init(){rs();vecs=Array.from({length:36},mkV);nodes=Array.from({length:6},mkN);}
  function draw(){
    t+=.0035;ctx.clearRect(0,0,W,H);
    nodes.forEach(nd=>{
      nd.phase+=.006;
      const pulse=.6+.4*Math.sin(nd.phase);
      const grd=ctx.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,nd.r*pulse);
      const a=nd.z*.038*pulse;
      grd.addColorStop(0,`rgba(212,175,55,${a*1.2})`);grd.addColorStop(.45,`rgba(180,148,50,${a*.5})`);grd.addColorStop(1,'rgba(180,148,50,0)');
      ctx.beginPath();ctx.arc(nd.x,nd.y,nd.r*pulse,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    });
    vecs.forEach(v=>{
      v.life++;if(v.life>v.maxLife){Object.assign(v,mkV());v.life=0;v.trail=[];return;}
      nodes.forEach(nd=>{const dx=nd.x-v.x,dy=nd.y-v.y,d=Math.hypot(dx,dy);if(d<nd.r*2.8&&d>5){const f=nd.str/(d*.01);v.vx+=(dx/d)*f;v.vy+=(dy/d)*f;}});
      const da=t*.25+v.alpha*7;v.vx+=Math.cos(da)*.0006;v.vy+=Math.sin(da)*.0005;
      const sp=Math.hypot(v.vx,v.vy),msp=.36+v.z*.2;if(sp>msp){v.vx*=msp/sp;v.vy*=msp/sp;}
      v.x+=v.vx;v.y+=v.vy;
      if(v.x<-20)v.x=W+20;if(v.x>W+20)v.x=-20;if(v.y<-20)v.y=H+20;if(v.y>H+20)v.y=-20;
      v.trail.push({x:v.x,y:v.y});if(v.trail.length>v.trailMax)v.trail.shift();
      const lf=v.life/v.maxLife,fade=Math.sin(lf*Math.PI);
      if(v.trail.length>2){
        for(let i=1;i<v.trail.length;i++){
          const tp=i/v.trail.length,ta=tp*v.alpha*fade*v.z;
          if(ta<.004)continue;
          ctx.beginPath();ctx.moveTo(v.trail[i-1].x,v.trail[i-1].y);ctx.lineTo(v.trail[i].x,v.trail[i].y);
          ctx.strokeStyle=v.hi?`rgba(212,175,55,${ta*1.1})`:`rgba(170,160,145,${ta})`;
          ctx.lineWidth=(tp*v.r*1.3)*v.z;ctx.lineCap='round';ctx.stroke();
        }
      }
      const pa=v.alpha*fade*(.45+v.z*.55);
      if(pa>.006){
        if(v.z>.5){ctx.beginPath();ctx.arc(v.x,v.y,v.r*3.5,0,Math.PI*2);ctx.fillStyle=`rgba(212,175,55,${pa*.07})`;ctx.fill();}
        ctx.beginPath();ctx.arc(v.x,v.y,v.r*(1+fade*.28),0,Math.PI*2);
        ctx.fillStyle=v.hi?`rgba(222,188,100,${pa})`:`rgba(185,178,165,${pa})`;ctx.fill();
      }
    });
    requestAnimationFrame(draw);
  }
  init();draw();
  cv.style.opacity='.62';
  addEventListener('resize',()=>init(),{passive:true});
};
</script>

<script type="text/babel" data-presets="react">
const{useState,useEffect,useRef,useCallback,Fragment}=React;

// Spring stagger — materialização em cascata
function useReveal(ref,opts={}){
  const[vis,setVis]=useState(false);
  useEffect(()=>{
    if(!ref.current)return;
    const io=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true);},{threshold:opts.threshold||.1,rootMargin:opts.margin||'0px 0px -30px 0px'});
    io.observe(ref.current);
    return()=>io.disconnect();
  },[ref]);
  return vis;
}

// Spring physics: stiffness 80 · damping 20 · mass 1
function springReveal(el,delay=0){
  if(!el||typeof gsap==='undefined')return;
  gsap.fromTo(el,
    {opacity:0,y:30,filter:'blur(4px)'},
    {opacity:1,y:0,filter:'blur(0px)',
     duration:1.1,delay,ease:'power4.out'}
  );
}

// Formato monetário

         duration:1.1,delay:i*0.15,ease:'power4.out'}

// ─── S4 — SIMULADOR ──────────────────────────────
function Simulator(){
  const ref=useRef(null);
  const vis=useReveal(ref,{threshold:.1});
  const[params,setParams]=useState({cap:2000,ops:8,ass:76,rk:1,mo:6});
  const[res,setRes]=useState({fin:0,profit:0,mult:'1.00'});
  const cvRef=useRef(null);

  useEffect(()=>{if(vis){window._qi&&window._qi(1.2);compute();}
  },[vis]);
  useEffect(()=>{compute();},[params]);

  function compute(){
    const{cap,ops,ass,rk,mo}=params;
    const a=ass/100,r=rk/100;
    const wks=mo*4.33,tot=ops*wks,w=tot*a,l=tot*(1-a);
    const wkR=w/wks*(r*3)-l/wks*r,mR=wkR*4.33;
    let cur=cap;const monthly=[cap];
    for(let m=0;m<mo;m++){cur*=(1+mR);monthly.push(Math.round(cur));}
    const fin=monthly[mo],profit=fin-cap;
    setRes({fin,profit,mult:(fin/cap).toFixed(2)});
    setTimeout(()=>drawChart(monthly,cap),40);
  }
  function drawChart(data,base){
    const cv=cvRef.current;if(!cv)return;
    const dpr=devicePixelRatio,ctx=cv.getContext('2d');
    cv.width=cv.offsetWidth*dpr;cv.height=120*dpr;cv.style.height='120px';
    ctx.scale(dpr,dpr);const w=cv.offsetWidth,h=120;ctx.clearRect(0,0,w,h);
    if(data.length<2)return;
    const mn=Math.min(...data)*.97,mx=Math.max(...data)*1.03;
    const px=i=>(i/(data.length-1))*w,py=v=>h-((v-mn)/(mx-mn))*(h*.84)-h*.08;
    ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
    [.33,.66].forEach(p=>{ctx.beginPath();ctx.moveTo(0,py(mn+(mx-mn)*p));ctx.lineTo(w,py(mn+(mx-mn)*p));ctx.stroke();});
    const gr=ctx.createLinearGradient(0,0,0,h);
    gr.addColorStop(0,'rgba(212,175,55,.18)');gr.addColorStop(1,'rgba(212,175,55,0)');
    ctx.beginPath();ctx.moveTo(px(0),py(data[0]));data.forEach((v,i)=>ctx.lineTo(px(i),py(v)));
    ctx.lineTo(px(data.length-1),h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
    const lg=ctx.createLinearGradient(0,0,w,0);
    lg.addColorStop(0,'rgba(100,75,18,.7)');lg.addColorStop(.5,'rgba(212,175,55,.9)');lg.addColorStop(1,'rgba(240,208,96,.8)');
    ctx.beginPath();ctx.moveTo(px(0),py(data[0]));data.forEach((v,i)=>ctx.lineTo(px(i),py(v)));
    ctx.strokeStyle=lg;ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.moveTo(px(0),py(data[0]));data.forEach((v,i)=>ctx.lineTo(px(i),py(v)));
    ctx.strokeStyle='rgba(212,175,55,.15)';ctx.lineWidth=5;ctx.stroke();
    if(base>=mn&&base<=mx){ctx.beginPath();ctx.moveTo(0,py(base));ctx.lineTo(w,py(base));ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.stroke();ctx.setLineDash([]);}
    data.forEach((v,i)=>{ctx.beginPath();ctx.arc(px(i),py(v),2.5,0,Math.PI*2);if(v>=base){ctx.shadowColor='rgba(212,175,55,.6)';ctx.shadowBlur=6;}ctx.fillStyle=v>=base?'rgba(240,208,96,.9)':'rgba(100,96,90,.4)';ctx.fill();ctx.shadowColor='transparent';ctx.shadowBlur=0;});
  }

  const SLIDERS=[
    {key:'cap',lbl:'Capital Inicial (€)',min:200,max:50000,step:200,fmt:v=>fmt(v)},
    {key:'ops',lbl:'Operações por Semana',min:2,max:20,step:1,fmt:v=>v+' / sem'},
    {key:'ass',lbl:'Assertividade (%)',min:55,max:85,step:1,fmt:v=>v+'%'},
    {key:'rk',lbl:'Risco por Operação (%)',min:.5,max:3,step:.25,fmt:v=>v.toFixed(2)+'%'},
    {key:'mo',lbl:'Horizonte (meses)',min:1,max:24,step:1,fmt:v=>v+(v===1?' mês':' meses')},
  ];
  const goldTxt={background:'linear-gradient(135deg,#F0D060,#D4AF37)',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent'};
  return(
    <Sec id="s4" bg="bg-bg-elevated">
      <div className="border-b border-yellow-500/15 mb-[clamp(48px,7vh,80px)]"/>
      <Eyebrow>Simulador Operacional · Projeção de Capital</Eyebrow>
      <h2 className="font-display text-[clamp(2rem,4vw,3rem)] font-bold leading-[1.12] tracking-tight text-white mt-3 mb-[clamp(32px,5vh,52px)] rv">
        Projete seu potencial<br/><span className="text-yellow-400/65">operacional com SMITH.</span>
      </h2>
      <div ref={ref} className="grid grid-cols-1 md:grid-cols-2 gap-[clamp(22px,3.5vw,40px)] items-start">
        <div className="flex flex-col gap-[clamp(13px,2vh,18px)] rv">
          <p className="font-body text-[clamp(.86rem,1.3vw,.94rem)] leading-[1.9] text-white/32">
            Ajuste os parâmetros. O modelo aplica a gestão de risco e assertividade histórica da SMITH na projeção mês a mês.
          </p>
          {SLIDERS.map(s=>(
            <div key={s.key} className="flex flex-col gap-2">
              <label className="font-mono text-[8px] tracking-[.16em] uppercase text-white/28">{s.lbl}</label>
              <div className="flex items-center gap-3">
                <input type="range" className="sim-slider"
                  min={s.min} max={s.max} step={s.step} value={params[s.key]}
                  onChange={e=>setParams(p=>({...p,[s.key]:+e.target.value}))}/>
                <span className="font-display text-[1rem] font-bold tracking-tight min-w-[60px] text-right" style={goldTxt}>
                  {s.fmt(params[s.key])}
                </span>
              </div>
            </div>
          ))}
        </div>
        <div className="flex flex-col gap-2 rv d2">
          {[
            {lbl:'Capital Projetado',v:fmt(res.fin),gold:true,s:'ao final do período'},
            {lbl:'Lucro Estimado',v:(res.profit>=0?'+':'')+fmt(res.profit),gold:false,s:'sobre capital inicial'},
            {lbl:'Multiplicador',v:res.mult+'x',gold:false,s:'fator de crescimento'},
          ].map(r=>(
            <div key={r.lbl} className="bento bento-gold p-[clamp(13px,1.8vw,18px)]" style={{borderRadius:'14px'}}>
              <p className="font-mono text-[8px] tracking-[.16em] uppercase text-white/22 mb-1.5">{r.lbl}</p>
              <p className="font-display text-[clamp(1.5rem,3.2vw,2.2rem)] font-bold tracking-tight text-white" style={r.gold?goldTxt:{}}>{r.v}</p>
              <p className="font-mono text-[8px] tracking-[.08em] uppercase text-white/18 mt-1">{r.s}</p>
            </div>
          ))}
          <div className="bento p-[clamp(12px,1.8vw,18px)]" style={{borderRadius:'14px'}}>
            <p className="font-mono text-[8px] tracking-[.14em] uppercase text-white/2 mb-2">Evolução Mês a Mês</p>
            <canvas ref={cvRef} aria-label="Gráfico evolução" style={{width:'100%',height:'120px',display:'block'}}/>
          </div>
        </div>
      </div>
      <p className="font-mono text-[8px] tracking-[.07em] text-white/14 text-center mt-[clamp(14px,2vh,22px)] leading-[1.8] rv">
        Projeção baseada em parâmetros históricos e gestão operacional SMITH. Não constitui promessa de rendimento.

// GSAP parallax headings
document.addEventListener('DOMContentLoaded',()=>{
  if(typeof gsap==='undefined'||typeof ScrollTrigger==='undefined')return;
  gsap.registerPlugin(ScrollTrigger);
  ['h2','h1'].forEach(sel=>{
    document.querySelectorAll(`section ${sel}`).forEach(el=>{
      gsap.fromTo(el,{y:20},{y:0,ease:'none',scrollTrigger:{trigger:el,start:'top 88%',end:'top 35%',scrub:1.3}});
    });
  });
  ScrollTrigger.refresh();
});

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
