   CURSOR
───────────────────────────────────────── */
const initCursor = () => {
  const dot  = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  if (!dot || !ring) return;
  let rx = 0, ry = 0, cx = 0, cy = 0;
  const onMove = e => {
    cx = e.clientX; cy = e.clientY;
    dot.style.left = cx + 'px'; dot.style.top = cy + 'px';
    document.documentElement.style.setProperty('--mx', ((cx / window.innerWidth)  - .5) * 2);
    document.documentElement.style.setProperty('--my', ((cy / window.innerHeight) - .5) * 2);
  };
  const tick = () => {
    rx += (cx - rx) * .1; ry += (cy - ry) * .1;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(tick);
  };
  window.addEventListener('mousemove', onMove, { passive: true });
  tick();
};

/* ─────────────────────────────────────────

const useIntersection = (threshold = 0.07) => {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
    obs.observe(el); return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
};

/* ─────────────────────────────────────────
   HOLO REVEAL — scan-line materialize
───────────────────────────────────────── */
const HoloReveal = ({ children, delay = 0, threshold = 0.06 }) => {
  const ref = useRef(null);
  const [revealed, setRevealed] = useState(false);
  const [scanning, setScanning]  = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !revealed) {
        setScanning(true); setRevealed(true);
        setTimeout(() => setScanning(false), 1300);
      }
    }, { threshold });
    obs.observe(el); return () => obs.disconnect();
  }, [threshold, revealed]);
  return (
    <div ref={ref} style={{
      position: 'relative',
      opacity:    revealed ? 1 : 0,
      transform:  revealed ? 'none' : 'translateY(26px)',
      filter:     revealed ? 'none' : 'blur(6px)',
      transition: revealed ? `all 1.1s cubic-bezier(.16,1,.3,1) ${delay}s` : 'none',
    }}>
      {scanning && <div className="holo-scan-line" style={{ top: 0 }} />}
      {children}
    </div>
  );
};

/* ─────────────────────────────────────────
   DECRYPT TEXT — matrix character reveal
───────────────────────────────────────── */
const DECODE_CHARS = '█▓▒░│┤╡╢╖╕╣║╗╝╜╛┐└┴┬├─┼╞╟╚╔╩╦╠═╬╧╤╥╙╘╒╓╫╪┘┌αβγδΩΨΦΣΠΔ01';

const DecryptText = ({ text, delay = 0, style = {}, className = '' }) => {
  const ref    = useRef(null);
  const [phase, setPhase]     = useState('idle');  // idle → scramble → done
  const [display, setDisplay] = useState('');

  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && phase === 'idle') {
        setTimeout(() => setPhase('scramble'), delay);
      }
    }, { threshold: 0.1 });
    obs.observe(el); return () => obs.disconnect();
  }, [phase, delay]);

  useEffect(() => {
    if (phase === 'idle') {
      setDisplay(text.split('').map(c => /\s/.test(c) ? c : DECODE_CHARS[0]).join(''));
      return;
    }
    if (phase !== 'scramble') return;
    let frame = 0;
    const total = 85;
    const id = setInterval(() => {
      frame++;
      const p  = frame / total;
      const rc = Math.floor(Math.pow(p, .65) * text.length);
      setDisplay(text.split('').map((c, i) => {
        if (/\s/.test(c)) return c;
        return i <= rc ? c : DECODE_CHARS[Math.floor(Math.random() * DECODE_CHARS.length)];
      }).join(''));
      if (frame >= total) { setDisplay(text); setPhase('done'); clearInterval(id); }
    }, 16);
    return () => clearInterval(id);
  }, [phase, text]);

  return <span ref={ref} className={className} style={{ ...style, fontVariantLigatures: 'none' }}>{display}</span>;
};

/* ─────────────────────────────────────────
   NEURAL CANVAS
───────────────────────────────────────── */
const NeuralCanvas = ({ opacity = 0.3 }) => {
  const cvs = useRef(null);
  useEffect(() => {
    const canvas = cvs.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize();
    const ro = new ResizeObserver(resize); ro.observe(canvas);
    const N = 88, MAX_D = 145;
    const pts = Array.from({ length: N }, (_, i) => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      vx: (Math.random() - .5) * .22, vy: (Math.random() - .5) * .22,
      r: Math.random() * 1.3 + .4, a: Math.random() * .5 + .15,
      pulse: Math.random() * Math.PI * 2,
      type: i < 5 ? 'core' : i < 18 ? 'data' : 'node',
    }));
    let id, t = 0, mx = window.innerWidth / 2, my = window.innerHeight / 2;
    const onMove = e => { mx = e.clientX; my = e.clientY; };
    window.addEventListener('mousemove', onMove, { passive: true });
    const draw = () => {
      t += .007; ctx.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => {
        if (p.type === 'data') {
          const dx = mx - p.x, dy = my - p.y, d = Math.sqrt(dx*dx+dy*dy);
          if (d < 220) { p.vx += dx/d*.004; p.vy += dy/d*.004; }
        }
        p.vx *= .998; p.vy *= .998;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width)  p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      });
      for (let i = 0; i < N; i++) for (let j = i+1; j < N; j++) {
        const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y, d = Math.sqrt(dx*dx+dy*dy);
        if (d < MAX_D) {
          const a = (1-d/MAX_D)*.17;
          const isCore = pts[i].type==='core'||pts[j].type==='core';
          const isData = pts[i].type==='data'||pts[j].type==='data';
          ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle = isCore ? `rgba(255,208,96,${a*1.5})` : isData ? `rgba(180,220,255,${a*.7})` : `rgba(201,168,76,${a})`;
          ctx.lineWidth = .5; ctx.stroke();
        }
      }
      pts.forEach(p => {
        const f = .7 + .3 * Math.sin(p.pulse + t);
        const color = p.type==='core' ? `rgba(255,208,96,${p.a*f*1.5})` : p.type==='data' ? `rgba(180,220,255,${p.a*f*.8})` : `rgba(201,168,76,${p.a*f})`;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*f,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
        if (p.type === 'core') {
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r*5,0,Math.PI*2);
          ctx.fillStyle=`rgba(255,208,96,0.07)`; ctx.fill();
        }
      });
      id = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(id); ro.disconnect(); window.removeEventListener('mousemove', onMove); };
  }, []);
  return <canvas ref={cvs} style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity }} />;
};

/* ─────────────────────────────────────────

───────────────────────────────────────── */
const EnergyCoreCanvas = () => {

  useEffect(() => {

      t += .009;
      const W = canvas.width, H = canvas.height, cx = W/2, cy = H*.41;

      for (let x=0; x<W; x+=44) for (let y=0; y<H; y+=44) {

      core.addColorStop(.8,'rgba(201,168,76,.5)'); core.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(cx,cy,28+4*Math.sin(t*1.8),0,Math.PI*2); ctx.fillStyle=core; ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,.96)'; ctx.fill();

      const bs=210, bo=13;

      [[cx-bs/2,cy-bs/2,1,1],[cx+bs/2,cy-bs/2,-1,1],[cx-bs/2,cy+bs/2,1,-1],[cx+bs/2,cy+bs/2,-1,-1]].forEach(([bx,by,sx,sy])=>{

const MetricCard = ({ label, value, suffix = '', prefix = '', sub, highlight }) => {
  const [ref, active] = useIntersection(.3);
  const [n, setN] = useState(0);
  const target = parseFloat(value);
  const dec    = String(value).includes('.') ? 1 : 0;
  useEffect(() => {
    if (!active) return;
    let start = null;

      const p = Math.min((ts - start) / 2200, 1);
      const e = 1 - Math.pow(1 - p, 4);
      setN(parseFloat((e * target).toFixed(dec)));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [active, target, dec]);

const WIN_RATIO = 7 / 8;   // 87.5% win rate
const WIN_PCT   = 0.018;   // 1% risk × 1.8R average across 4 targets
const LOSS_PCT  = 0.010;   // 1% risk stop

const fmtEuro = n => {
  if (n >= 1e9) return `€${(n/1e9).toFixed(2)}B`;
  if (n >= 1e6) return `€${(n/1e6).toFixed(2)}M`;
  if (n >= 1e3) return `€${Math.round(n).toLocaleString('pt-PT')}`;
  return `€${n.toFixed(0)}`;
};
const fmtMult = x => {
  if (x >= 1e6) return `${(x/1e6).toFixed(1)}M×`;
  if (x >= 1e3) return `${(x/1e3).toFixed(1)}k×`;
  return `${Math.round(x)}×`;
};
