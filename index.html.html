/* ── HOOKS ── */
const useIntersection = (threshold=0.15) => {
  const ref = useRef(null);
  const [visible,setVisible] = useState(false);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVisible(true);},{threshold});
    obs.observe(el); return()=>obs.disconnect();
  },[threshold]);
  return [ref,visible];
};

const useCounter = (target,duration=2200,active=false,decimals=0) => {
  const [val,setVal] = useState(0);
  useEffect(()=>{
    if(!active) return;
    let start=null;
    const step=(ts)=>{
      if(!start) start=ts;
      const p=Math.min((ts-start)/duration,1);
      const ease=1-Math.pow(1-p,4);
      setVal(parseFloat((ease*target).toFixed(decimals)));
      if(p<1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },[active,target,duration,decimals]);
  return val;
};

/* ── NEURAL CANVAS ── */
const NeuralCanvas = () => {
  const canvasRef = useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    const resize=()=>{canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;};
    resize();
    const ro=new ResizeObserver(resize); ro.observe(canvas);
    const N=80,MAX_D=140;
    const pts=Array.from({length:N},()=>({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      r:Math.random()*1.2+.4,a:Math.random()*.6+.15,pulse:Math.random()*Math.PI*2,
    }));
    let id,t=0;
    const draw=()=>{
      t+=.008; ctx.clearRect(0,0,canvas.width,canvas.height);
      for(let i=0;i<N;i++){
        for(let j=i+1;j<N;j++){
          const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<MAX_D){
            ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
            ctx.strokeStyle=`rgba(201,168,76,${(1-d/MAX_D)*.18})`;ctx.lineWidth=.6;ctx.stroke();
          }
        }
      }
      pts.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0||p.x>canvas.width)p.vx*=-1;
        if(p.y<0||p.y>canvas.height)p.vy*=-1;
        const f=.7+.3*Math.sin(p.pulse+t);
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*f,0,Math.PI*2);
        ctx.fillStyle=`rgba(201,168,76,${p.a*f})`;ctx.fill();
        if(p.r>1.2){ctx.beginPath();ctx.arc(p.x,p.y,p.r*3,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,0.03)';ctx.fill();}
      });
      id=requestAnimationFrame(draw);
    };
    draw();
    return()=>{cancelAnimationFrame(id);ro.disconnect();};
  },[]);
  return <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%'}} />;
};

/* ── SIMULATOR ── */
const Simulator = () => {
  const [capital,setCapital]=useState(500);
  const [ops,setOps]=useState(30);
  const [months,setMonths]=useState(6);

  const WIN_RATIO=7/8;
  const WIN_PCT=0.04;
  const LOSS_PCT=0.01;
  const tradesPerMonth=ops*4;
  const winsPerMonth=Math.round(tradesPerMonth*WIN_RATIO);
  const lossesPerMonth=tradesPerMonth-winsPerMonth;
  const monthlyMultiplier=1+(winsPerMonth*WIN_PCT)-(lossesPerMonth*LOSS_PCT);
  const monthlyReturnPct=((monthlyMultiplier-1)*100).toFixed(0);

  const getCapitalAt=(m)=>{let bal=capital;for(let i=0;i<m;i++)bal*=monthlyMultiplier;return bal;};

  const months_arr=Array.from({length:months},(_,i)=>({label:`M${i+1}`,val:getCapitalAt(i+1)}));
  const finalCapital=getCapitalAt(months);
  const profit=finalCapital-capital;
  const growthX=Math.round(finalCapital/capital);
  const maxVal=Math.max(...months_arr.map(m=>m.val));

  const fmtCurrency=(n)=>{
    if(n>=1000000000)return`€${(n/1000000000).toFixed(2)}B`;
    if(n>=1000000)return`€${(n/1000000).toFixed(2)}M`;
    if(n>=1000)return`€${Math.round(n).toLocaleString('pt-PT')}`;
    return`€${n.toFixed(0)}`;
  };
  const fmtMultiplier=(x)=>{
    if(x>=1000000)return`${(x/1000000).toFixed(1)}M×`;
    if(x>=1000)return`${(x/1000).toFixed(1)}k×`;
    return`${x}×`;
  };

  const controls=[
    {label:'Capital Alocado',display:`€${capital.toLocaleString('pt-PT')}`,min:100,max:50000,step:100,state:capital,set:setCapital,minLabel:'€100',maxLabel:'€50k'},
    {label:'Operações / Semana',display:ops,min:10,max:50,step:1,state:ops,set:setOps,minLabel:'10',maxLabel:'50'},
    {label:'Horizonte (meses)',display:`${months} meses`,min:1,max:24,step:1,state:months,set:setMonths,minLabel:'1',maxLabel:'24'},
  ];

  return(
    <div style={{borderRadius:20,padding:'clamp(24px,4vw,40px)',background:'linear-gradient(135deg,rgba(201,168,76,.04) 0%,rgba(50,40,10,.05) 100%)',border:'1px solid rgba(201,168,76,.18)',boxShadow:'0 0 60px rgba(201,168,76,.07),inset 0 0 60px rgba(201,168,76,.02)',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',left:0,right:0,height:1,background:'linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent)',animation:'scanline 4s linear infinite',pointerEvents:'none'}}/>
      {[{top:0,left:0,borderTop:'2px solid rgba(201,168,76,.4)',borderLeft:'2px solid rgba(201,168,76,.4)',borderRadius:'20px 0 0 0'},{top:0,right:0,borderTop:'2px solid rgba(201,168,76,.4)',borderRight:'2px solid rgba(201,168,76,.4)',borderRadius:'0 20px 0 0'},{bottom:0,left:0,borderBottom:'2px solid rgba(201,168,76,.4)',borderLeft:'2px solid rgba(201,168,76,.4)',borderRadius:'0 0 0 20px'},{bottom:0,right:0,borderBottom:'2px solid rgba(201,168,76,.4)',borderRight:'2px solid rgba(201,168,76,.4)',borderRadius:'0 0 20px 0'}].map((s,i)=><div key={i} style={{position:'absolute',width:24,height:24,...s}}/>)}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:32}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:'#C9A84C',boxShadow:'0 0 12px rgba(201,168,76,.4)',animation:'blink 2s infinite'}}/>
        <span style={{fontSize:11,fontWeight:700,color:'#C9A84C',letterSpacing:'.14em',textTransform:'uppercase'}}>Simulador de Projeção · Motor Ativo</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:28,marginBottom:36}}>
        {controls.map(ctrl=>(
          <div key={ctrl.label}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <span style={{fontSize:11,color:T.textSub,letterSpacing:'.06em',textTransform:'uppercase'}}>{ctrl.label}</span>
              <span style={{fontSize:13,fontWeight:700,color:'#C9A84C'}}>{ctrl.display}</span>
            </div>
            <input type="range" min={ctrl.min} max={ctrl.max} step={ctrl.step} value={ctrl.state} onChange={e=>ctrl.set(Number(e.target.value))}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
              <span style={{fontSize:10,color:T.textMuted}}>{ctrl.minLabel}</span>
              <span style={{fontSize:10,color:T.textMuted}}>{ctrl.maxLabel}</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{marginBottom:28}}>
        <div style={{display:'flex',alignItems:'flex-end',gap:months>12?3:8,height:110}}>
          {months_arr.map((m,i)=>{
            const hPct=(m.val/maxVal)*96;
            return(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{width:'100%',height:`${hPct}px`,minHeight:3,borderRadius:'4px 4px 0 0',background:'linear-gradient(180deg,#C9A84C,#8B6914)',boxShadow:'0 -4px 24px rgba(201,168,76,.45),0 0 12px rgba(201,168,76,.25)',transition:'height .5s cubic-bezier(.34,1.56,.64,1)',position:'relative',overflow:'hidden'}}>

                </div>
                {months<=12&&<span style={{fontSize:9,color:T.textMuted,letterSpacing:'.04em'}}>{m.label}</span>}
              </div>

        <div style={{height:1,background:'linear-gradient(90deg,transparent,rgba(201,168,76,.3),transparent)'}}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        {[
          {label:'Capital Final',val:fmtCurrency(finalCapital)},
          {label:'Lucro Acumulado',val:fmtCurrency(profit)},
          {label:'Multiplicador',val:fmtMultiplier(growthX)},
          {label:'Retorno / Mês',val:`+${monthlyReturnPct}%`},
        ].map(r=>(
          <div key={r.label} style={{textAlign:'center',padding:'14px 8px',background:'rgba(201,168,76,.04)',border:'1px solid rgba(201,168,76,.1)',borderRadius:10}}>
            <div style={{fontSize:10,color:T.textSub,letterSpacing:'.06em',marginBottom:6,textTransform:'uppercase'}}>{r.label}</div>
            <div style={{fontSize:'clamp(.9rem,2vw,1.15rem)',fontWeight:800,color:'#C9A84C',textShadow:'0 0 20px rgba(201,168,76,.4)'}}>{r.val}</div>
          </div>
        ))}
      </div>
      <div style={{padding:'12px 16px',background:'rgba(220,38,38,.05)',borderRadius:8,border:'1px solid rgba(220,38,38,.12)'}}>
        <p style={{fontSize:11,color:'rgba(220,38,38,.65)',lineHeight:1.65,letterSpacing:'.02em'}}>
          * Projeção Day Trade Institucional: ratio 1 Loss : 7 Gains | +4% por win | −1% por loss | ~120 operações/mês.
          O crescimento exponencial reflete juros compostos em alta frequência. Desempenho passado não garante resultados futuros.
        </p>
      </div>
    </div>
  );
};
