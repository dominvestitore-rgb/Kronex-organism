<!-- ═══════════════════════════════════════════════════════════
     Three.js GLSL Quantum Smoke
════════════════════════════════════════════════════════════ -->
<script>
(function(){
  if(typeof THREE==='undefined')return;
  const cv=document.getElementById('qc');
  const renderer=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:false,powerPreference:'low-power'});
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
  renderer.setClearColor(0x000000,0);
  const scene=new THREE.Scene(),camera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  const frag=`
    precision mediump float;
    uniform float uTime;uniform vec2 uRes;uniform float uInt;
    vec2 h2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return -1.0+2.0*fract(sin(p)*43758.5453);}
    float gn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);return mix(mix(dot(h2(i),f),dot(h2(i+vec2(1,0)),f-vec2(1,0)),u.x),mix(dot(h2(i+vec2(0,1)),f-vec2(0,1)),dot(h2(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);}

<!-- ═══════════════════════════════════════════════════════════
     REDE NEURAL — organismo digital vivo
     Linhas finas opacidade variável, glow champagne,
     profundidade simulada por z-index e blur de pontos
════════════════════════════════════════════════════════════ -->
<script>
(function(){
  var cv=document.getElementById('neural-layer');
  if(!cv)return;
  var ctx=cv.getContext('2d');
  var W,H,nodes=[],raf;
  function mkNode(){
    var z=Math.random();
    return{x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*(.1+z*.09),vy:(Math.random()-.5)*(.1+z*.09),
      z:z,r:.3+z*1.1,pa:.12+z*.42,pp:Math.random()*Math.PI*2,
      drift:(Math.random()-.5)*.0011};
  }
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  function init(){resize();nodes=Array.from({length:56},mkNode);}
  var t=0;
  function draw(){
    t+=.005;ctx.clearRect(0,0,W,H);
    for(var i=0;i<nodes.length;i++){
      for(var j=i+1;j<nodes.length;j++){
        var ni=nodes[i],nj=nodes[j];
        var dx=ni.x-nj.x,dy=ni.y-nj.y;
        var d=Math.sqrt(dx*dx+dy*dy);
        var maxD=90+(ni.z+nj.z)*45;
        if(d<maxD){
          var ratio=1-d/maxD;
          var avgZ=(ni.z+nj.z)/2;
          var alpha=ratio*(.07+avgZ*.08);
          ctx.beginPath();ctx.moveTo(ni.x,ni.y);ctx.lineTo(nj.x,nj.y);
          if(d<38){
            ctx.strokeStyle='rgba(240,226,189,'+(alpha*1.9)+')';
            ctx.lineWidth=.28+avgZ*.38;
          } else {
            ctx.strokeStyle='rgba(201,168,106,'+alpha+')';
            ctx.lineWidth=.15+avgZ*.22;
          }
          ctx.stroke();
        }
      }
    }
    nodes.forEach(function(p){
      p.vx+=p.drift*Math.sin(t+p.pp);
      p.vy+=p.drift*Math.cos(t*.7+p.pp);
      var sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      var maxSp=.14+p.z*.11;
      if(sp>maxSp){p.vx*=maxSp/sp;p.vy*=maxSp/sp;}
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      var pulse=.7+.3*Math.sin(p.pp+t*(1+p.z));
      var alpha=p.pa*pulse;
      if(p.z>.5){
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*4.2,0,Math.PI*2);
        ctx.fillStyle='rgba(216,192,138,'+(alpha*.055)+')';ctx.fill();
      }
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*pulse,0,Math.PI*2);
      ctx.fillStyle=p.z>.6
        ?'rgba(240,226,189,'+alpha+')'
        :'rgba(201,168,106,'+(alpha*.68)+')';
      ctx.fill();
    });
    raf=requestAnimationFrame(draw);
  }
  init();draw();
  setTimeout(function(){cv.style.opacity='.82';},1900);
  addEventListener('resize',function(){resize();},{passive:true});
})();
</script>

  const [inView,setInView] = useState(false);
  useEffect(()=>{
    if(!ref.current)return;
    const obs=new IntersectionObserver(([e])=>e.isIntersecting&&setInView(true),{threshold:.15});

/* ──────────────────────────────────────────────────────────
   S5 — SIMULADOR
────────────────────────────────────────────────────────── */
function Simulator(){
  const secRef=useRef(null);
  const cvRef=useRef(null);
  const inView=useInView(secRef,{once:true,margin:'0px 0px -80px 0px'});
  const [params,setParams]=useState({cap:2000,ops:8,ass:76,rk:1,mo:6});
  const [results,setResults]=useState({fin:0,profit:0,pct:'0',mult:'1.00'});

  useEffect(()=>{
    if(inView){window._qi&&window._qi(1.2);compute();}
  },[inView]);

  useEffect(()=>{compute();},[params]);

  function compute(){
    const {cap,ops,ass,rk,mo}=params;
    const a=ass/100,r=rk/100;
    const wks=mo*4.33,tot=ops*wks,w=tot*a,l=tot*(1-a);
    const wkR=w/wks*(r*3)-l/wks*r,mR=wkR*4.33;
    let cur=cap;const monthly=[cap];
    for(let m=0;m<mo;m++){cur*=(1+mR);monthly.push(Math.round(cur));}
    const fin=monthly[mo],profit=fin-cap,pct=(profit/cap*100).toFixed(1);
    setResults({fin,profit,pct,mult:(fin/cap).toFixed(2)});
    setTimeout(()=>drawSim(monthly,cap),50);
  }

  function drawSim(data,base){
    const cv=cvRef.current;if(!cv)return;
    const dpr=devicePixelRatio,ctx=cv.getContext('2d');
    cv.width=cv.offsetWidth*dpr;cv.height=128*dpr;cv.style.height='128px';
    ctx.scale(dpr,dpr);const w=cv.offsetWidth,h=128;ctx.clearRect(0,0,w,h);
    if(data.length<2)return;
    const mn=Math.min(...data)*.97,mx=Math.max(...data)*1.03;
    const px=i=>(i/(data.length-1))*w,py=v=>h-((v-mn)/(mx-mn))*(h*.84)-h*.08;
    ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
    [.33,.66].forEach(p=>{ctx.beginPath();ctx.moveTo(0,py(mn+(mx-mn)*p));ctx.lineTo(w,py(mn+(mx-mn)*p));ctx.stroke();});
    const gr=ctx.createLinearGradient(0,0,0,h);
    gr.addColorStop(0,'rgba(216,192,138,.22)');gr.addColorStop(.5,'rgba(201,168,106,.1)');gr.addColorStop(1,'rgba(141,116,71,0)');
    ctx.beginPath();ctx.moveTo(px(0),py(data[0]));data.forEach((v,i)=>ctx.lineTo(px(i),py(v)));
    ctx.lineTo(px(data.length-1),h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
    const lg=ctx.createLinearGradient(0,0,w,0);
    lg.addColorStop(0,'rgba(141,116,71,.7)');lg.addColorStop(.4,'rgba(201,168,106,.88)');lg.addColorStop(1,'rgba(240,226,189,.75)');
    ctx.beginPath();ctx.moveTo(px(0),py(data[0]));data.forEach((v,i)=>ctx.lineTo(px(i),py(v)));
    ctx.strokeStyle=lg;ctx.lineWidth=1.6;ctx.stroke();
    ctx.beginPath();ctx.moveTo(px(0),py(data[0]));data.forEach((v,i)=>ctx.lineTo(px(i),py(v)));
    ctx.strokeStyle='rgba(216,192,138,.18)';ctx.lineWidth=5;ctx.stroke();
    if(base>=mn&&base<=mx){ctx.beginPath();ctx.moveTo(0,py(base));ctx.lineTo(w,py(base));ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.stroke();ctx.setLineDash([]);}
    data.forEach((v,i)=>{
      ctx.beginPath();ctx.arc(px(i),py(v),2.5,0,Math.PI*2);
      if(v>=base){ctx.shadowColor='rgba(216,192,138,.6)';ctx.shadowBlur=6;}
      ctx.fillStyle=v>=base?'rgba(240,226,189,.92)':'rgba(142,142,147,.45)';ctx.fill();
      ctx.shadowColor='transparent';ctx.shadowBlur=0;
    });
  }

  const SLIDERS=[
    {key:'cap',label:'Capital Inicial (€)',min:200,max:50000,step:200,fmt:v=>fmt(v)},
    {key:'ops',label:'Operações por Semana',min:2,max:20,step:1,fmt:v=>v+' / sem'},
    {key:'ass',label:'Assertividade (%)',min:55,max:85,step:1,fmt:v=>v+'%'},
    {key:'rk', label:'Risco por Operação (%)',min:.5,max:3,step:.25,fmt:v=>v.toFixed(2)+'%'},
    {key:'mo', label:'Horizonte (meses)',min:1,max:24,step:1,fmt:v=>v+(v===1?' mês':' meses')},
  ];

  const metaGrad={background:'linear-gradient(135deg,#D8C08A,#F0E2BD)',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent'};

  return(
    <section ref={secRef} id="s5" className="sec-s5 relative bg-void py-[clamp(80px,12vh,140px)]">
      <div className="max-w-[1080px] mx-auto px-[clamp(20px,5vw,72px)] relative z-[1]">
